name: Build control-panel installers

# Three-stage pipeline:
#   build    – compile each platform's 18 connector binaries, upload them.
#   manifest – hash every binary into binaries.json, rename them as release
#              assets (<id>-<plat>), publish them + checksums to the release.
#   app      – embed binaries.json + registry.json (NO connector binaries — the
#              app downloads them on demand), run `tauri build`, publish the
#              thin installers. Because nothing is embedded, every installer is
#              now a few MB (the Linux AppImage no longer carries 18 binaries).
on:
  push:
    tags: ["cp-v*"]
  workflow_dispatch: {}

permissions:
  contents: write

env:
  CONNECTORS: "confluence jira bitbucket airtable mysql mariadb clickhouse oracle gitlab postgres github jenkins redmine grafana elasticsearch mattermost mongodb sentry"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            plat: win
          - os: macos-latest
            plat: mac
          - os: ubuntu-latest
            plat: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Build BOTH macOS arches on the Apple Silicon runner (macos-13 Intel
      # runners are scarce/unavailable); x86_64 is cross-compiled.
      - name: Add macOS targets
        if: matrix.plat == 'mac'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - name: Build connector binaries
        shell: bash
        run: |
          BINS="--bin confluence --bin jira --bin bitbucket --bin airtable --bin mysql --bin mariadb --bin clickhouse --bin oracle --bin gitlab --bin postgres --bin github --bin jenkins --bin redmine --bin grafana --bin elasticsearch --bin mattermost --bin mongodb --bin sentry"
          if [ "${{ matrix.plat }}" = "mac" ]; then
            cargo build --release --target aarch64-apple-darwin $BINS
            cargo build --release --target x86_64-apple-darwin $BINS
          else
            cargo build --release $BINS
          fi
      - name: Collect binaries (raw names)
        shell: bash
        run: |
          if [ "${{ matrix.plat }}" = "mac" ]; then
            mkdir -p conn-mac-arm conn-mac-intel
            for id in $CONNECTORS; do
              cp "target/aarch64-apple-darwin/release/$id" "conn-mac-arm/$id"
              cp "target/x86_64-apple-darwin/release/$id"  "conn-mac-intel/$id"
            done
          elif [ "${{ matrix.plat }}" = "win" ]; then
            mkdir -p conn
            for id in $CONNECTORS; do cp "target/release/$id.exe" "conn/$id.exe"; done
          else
            mkdir -p conn
            for id in $CONNECTORS; do cp "target/release/$id" "conn/$id"; done
          fi
      - name: Upload (win / linux)
        if: matrix.plat != 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: conn-${{ matrix.plat }}
          path: conn/
      - name: Upload mac (arm)
        if: matrix.plat == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: conn-mac-arm
          path: conn-mac-arm/
      - name: Upload mac (intel)
        if: matrix.plat == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: conn-mac-intel
          path: conn-mac-intel/

  manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Read app version
        id: ver
        run: echo "version=$(jq -r .version crates/control-panel/tauri.conf.json)" >> "$GITHUB_OUTPUT"
      - name: Generate binaries.json (per-platform sha256)
        run: |
          node scripts/gen-binaries-json.mjs \
            --win artifacts/conn-win \
            --mac-arm artifacts/conn-mac-arm \
            --mac-intel artifacts/conn-mac-intel \
            --linux artifacts/conn-linux \
            --version "${{ steps.ver.outputs.version }}" \
            --out binaries.json
          cat binaries.json | head -20
      - name: Arrange release assets (<id>-<plat>) + checksums
        run: |
          mkdir -p release-assets
          for id in $CONNECTORS; do
            cp "artifacts/conn-win/$id.exe"        "release-assets/$id-win.exe"
            cp "artifacts/conn-mac-arm/$id"        "release-assets/$id-mac-arm"
            cp "artifacts/conn-mac-intel/$id"      "release-assets/$id-mac-intel"
            cp "artifacts/conn-linux/$id"          "release-assets/$id-linux"
          done
          ( cd release-assets && sha256sum * > ../checksums.txt )
          cp checksums.txt release-assets/checksums.txt
      - name: Upload binaries.json for the app job
        uses: actions/upload-artifact@v4
        with:
          name: binaries-json
          path: binaries.json
      - name: Publish connector binaries + checksums to the release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          make_latest: false
          files: release-assets/*

  app:
    needs: manifest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            plat: win
          - os: macos-latest
            plat: mac
          - os: ubuntu-latest
            plat: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Add macOS targets (universal dmg)
        if: matrix.plat == 'mac'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - name: Linux Tauri system deps
        if: matrix.plat == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Stage app resources (registry + binaries manifest only)
        shell: bash
        run: |
          mkdir -p crates/control-panel/resources
          cp site/registry.json crates/control-panel/resources/registry.json
      - uses: actions/download-artifact@v4
        with:
          name: binaries-json
          path: crates/control-panel/resources
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked
      - name: Build app + installer
        working-directory: crates/control-panel
        shell: bash
        run: |
          if [ "${{ matrix.plat }}" = "mac" ]; then
            cargo tauri build --target universal-apple-darwin
          else
            cargo tauri build
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: control-panel-${{ matrix.plat }}
          if-no-files-found: warn
          path: |
            crates/control-panel/target/release/bundle/**/*.msi
            crates/control-panel/target/release/bundle/**/*-setup.exe
            crates/control-panel/target/release/bundle/**/*.deb
            crates/control-panel/target/release/bundle/**/*.AppImage
            crates/control-panel/target/universal-apple-darwin/release/bundle/**/*.dmg
      - name: Publish to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          # Installer releases must not steal "latest" from the v* .mcpb releases,
          # because the site links to /releases/latest/download/<id>.mcpb.
          make_latest: false
          files: |
            crates/control-panel/target/release/bundle/**/*.msi
            crates/control-panel/target/release/bundle/**/*-setup.exe
            crates/control-panel/target/release/bundle/**/*.deb
            crates/control-panel/target/release/bundle/**/*.AppImage
            crates/control-panel/target/universal-apple-darwin/release/bundle/**/*.dmg
