<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Claude Chat MCP</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-mesh" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>

    <main class="shell">
      <header class="masthead">
        <div class="mark">
          <svg width="16" height="16" viewBox="0 0 14 14" aria-hidden="true">
            <rect x="1" y="1" width="5" height="5" fill="currentColor" />
            <rect x="8" y="1" width="5" height="5" fill="currentColor" opacity=".55" />
            <rect x="1" y="8" width="5" height="5" fill="currentColor" opacity=".55" />
            <rect x="8" y="8" width="5" height="5" fill="currentColor" opacity=".25" />
          </svg>
          <span data-i18n="appName">Claude Chat MCP</span>
        </div>
        <div class="masthead-actions">
          <button type="button" id="report-open" class="report-btn" data-i18n="reportBug">Report a bug</button>
          <div class="lang-toggle" role="group" aria-label="Language">
            <button type="button" class="lang-btn active" data-lang="en">EN</button>
            <button type="button" class="lang-btn" data-lang="vi">VI</button>
          </div>
        </div>
      </header>

      <dialog id="report-dialog" class="report-dialog" aria-labelledby="report-title">
        <form id="report-form">
          <h3 id="report-title" data-i18n="reportTitle">Report a bug</h3>
          <p class="report-sub" data-i18n="reportSub">Tell us what happened. Your app version and OS are included automatically.</p>
          <textarea id="report-msg" rows="4" required data-i18n-ph="reportPh"></textarea>
          <input id="report-email" type="email" data-i18n-ph="reportEmail" />
          <div class="report-actions">
            <button type="button" id="report-cancel" class="btn btn-ghost" data-i18n="reportCancel">Cancel</button>
            <button type="submit" class="btn btn-primary" data-i18n="reportSend">Send</button>
          </div>
          <p id="report-status" class="status" aria-live="polite"></p>
        </form>
      </dialog>

      <section class="intro">
        <h1 data-i18n="title">Connector control panel</h1>
        <p class="lede" data-i18n="lede">
          Turn connectors on or off, set credentials, and choose a permission role.
          Changes are written to Claude Desktop directly.
        </p>
      </section>

      <div class="toolbar">
        <div class="app-search">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.5" y2="16.5"></line></svg>
          <input id="app-search" type="search" autocomplete="off" spellcheck="false" aria-label="Search connectors" />
        </div>
        <div class="app-filters" id="app-filters" role="group" aria-label="Filter by group"></div>
      </div>

      <div id="global-status" class="status" aria-live="polite"></div>

      <div id="connectors" class="connector-grid"></div>
    </main>

    <!-- Card template -->
    <template id="card-tpl">
      <article class="card" data-state="off">
        <div class="card-head">
          <div class="card-id">
            <span class="card-group"></span>
            <h2 class="card-name"></h2>
            <p class="card-desc"></p>
          </div>
          <div class="card-state">
            <span class="state-pill" data-i18n="off">Off</span>
          </div>
        </div>
        <button type="button" class="expander">
          <span class="expander-label" data-i18n="configure">Configure</span>
          <span class="chev" aria-hidden="true">▾</span>
        </button>
        <div class="card-body" hidden>
          <form class="fields" autocomplete="off" novalidate></form>
          <div class="role-row">
            <label class="field-label" data-i18n="role">Permission role</label>
            <select class="role-select">
              <option value="viewer" data-i18n="viewer">Viewer (read only)</option>
              <option value="writer" data-i18n="writer">Writer (read and write)</option>
            </select>
            <span class="field-hint role-hint" data-i18n="roleHint"></span>
          </div>
          <p class="card-notes" hidden></p>
          <div class="card-status status" aria-live="polite"></div>
          <div class="card-actions">
            <button type="button" class="btn btn-ghost btn-test">
              <span data-i18n="testConn">Test connection</span>
            </button>
            <button type="button" class="btn btn-primary btn-install">
              <span data-i18n="install">Install</span>
            </button>
            <button type="button" class="btn btn-danger btn-remove" hidden data-i18n="remove">
              Remove
            </button>
          </div>
          <p class="restart-note" hidden data-i18n="restartNote">
            Now fully quit and reopen Claude Desktop for this change to take effect.
          </p>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
